<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heidi W. — Projects Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:transparent}
body{font-family:'Barlow',ui-sans-serif,sans-serif;font-weight:300;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.75);user-select:none}
#bg{position:fixed;inset:0;z-index:0;background:#000}
#bg-shader{position:absolute;inset:0;width:100%;height:100%}
#c{position:fixed;inset:0;z-index:1;display:block}
.nav{position:fixed;top:0;left:0;display:flex;align-items:center;gap:10px;padding:12px 16px;z-index:100}
.nav-item{display:flex;align-items:center;padding:10px 20px;border:1px solid rgba(255,255,255,.18);border-radius:6px;font-size:10.5px;letter-spacing:.10em;white-space:nowrap;background:transparent;cursor:pointer;transition:transform .28s cubic-bezier(.34,1.56,.64,1),border-color .25s}
.nav-item:hover{transform:scale(1.08);border-color:rgba(255,255,255,.5)}
.bottom-nav{position:fixed;bottom:14px;right:16px;display:flex;gap:14px;z-index:100;font-size:9.5px;letter-spacing:.09em}
.bottom-nav span{cursor:pointer;transition:transform .28s cubic-bezier(.34,1.56,.64,1),color .2s}
.bottom-nav .on{color:rgba(255,255,255,.85)}
.bottom-nav .off{color:rgba(255,255,255,.28)}
.bottom-nav span:hover{transform:scale(1.18);color:rgba(255,255,255,.95)!important}

@keyframes tt-in{
  0%  {opacity:0;transform:translateX(-32px) scale(0.62)}
  55% {opacity:1;transform:translateX(6px) scale(1.06)}
  75% {transform:translateX(-3px) scale(0.97)}
  100%{opacity:1;transform:translateX(0) scale(1)}
}
@keyframes tt-out{
  0%  {opacity:1;transform:translateX(0) scale(1)}
  20% {transform:translateX(7px) scale(1.04)}
  100%{opacity:0;transform:translateX(-26px) scale(0.68)}
}
#tooltip{position:fixed;z-index:200;pointer-events:none;transform:translateY(-50%)}
#tooltip-inner{
  background:rgba(8,8,12,.93);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  border:1px solid rgba(138,50,220,.38);
  border-radius:10px;
  padding:16px 20px;
  min-width:220px;max-width:320px;
  margin-left:10px;
  transform-origin:left center;
  opacity:0;
}
#tooltip.tt-on  #tooltip-inner{animation:tt-in  .50s cubic-bezier(.34,1.56,.64,1) forwards}
#tooltip.tt-out #tooltip-inner{animation:tt-out .26s cubic-bezier(.55,0,1,.45)    forwards}
#tooltip-inner::after{
  content:'';position:absolute;left:-6px;top:50%;
  transform:translateY(-50%) rotate(45deg);
  width:10px;height:10px;
  background:rgba(8,8,12,.93);
  border-left:1px solid rgba(138,50,220,.38);
  border-bottom:1px solid rgba(138,50,220,.38);
}
#tt-title{font-size:13px;font-weight:400;letter-spacing:.12em;color:rgba(255,255,255,.95);margin-bottom:6px}
#tt-sub{font-size:10px;letter-spacing:.05em;color:rgba(255,255,255,.4);margin-bottom:11px;line-height:1.5;text-transform:none}
#tt-tags{display:flex;flex-wrap:wrap;gap:5px}
.tt-tag{font-size:8.5px;padding:3px 9px;border-radius:20px;border:1px solid rgba(138,50,220,.5);color:rgba(180,100,255,.9);letter-spacing:.07em}
</style>
</head>
<body>

<div id="bg"><canvas id="bg-shader"></canvas></div>

<header class="nav">
  <div class="nav-item">HEIDI W. — PROJECTS PORTFOLIO</div>
  <div class="nav-item">CONTACT</div>
</header>

<canvas id="c"></canvas>

<div id="tooltip">
  <div id="tooltip-inner">
    <div id="tt-title"></div>
    <div id="tt-sub"></div>
    <div id="tt-tags"></div>
  </div>
</div>

<div class="bottom-nav">
  <span class="on">OVERVIEW</span>
  <span class="off">INDEX</span>
</div>

<script src="three.min.js"></script>
<script src="projects.js"></script>
<script>
// ─── Shader background (plain WebGL, no dependencies) ───────────────────────
const _bgRender = (function () {
  const bgCanvas = document.getElementById('bg-shader');
  if (!bgCanvas) return null;
  const gl = bgCanvas.getContext('webgl');
  if (!gl) return null;

  function compile(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) { console.error(gl.getShaderInfoLog(s)); return null; }
    return s;
  }

  const vert = compile(gl.VERTEX_SHADER, `attribute vec4 pos;void main(){gl_Position=pos;}`);
  const frag = compile(gl.FRAGMENT_SHADER, `
    precision highp float;
    uniform vec2 iResolution;
    uniform float iTime;

    const float overallSpeed     = 0.09;
    const float gridSmoothWidth  = 0.015;
    const float axisWidth        = 0.05;
    const float majorLineWidth   = 0.025;
    const float minorLineWidth   = 0.0125;
    const float majorLineFreq    = 5.0;
    const float minorLineFreq    = 1.0;
    const float scale            = 5.0;
    const vec4  lineColor        = vec4(0.16, 0.07, 0.34, 1.0);
    const float minLineWidth     = 0.01;
    const float maxLineWidth     = 0.2;
    const float lineSpeed        = 1.0 * overallSpeed;
    const float lineAmplitude    = 1.0;
    const float lineFrequency    = 0.2;
    const float warpSpeed        = 0.2 * overallSpeed;
    const float warpFrequency    = 0.5;
    const float warpAmplitude    = 1.0;
    const float offsetFrequency  = 0.5;
    const float offsetSpeed      = 1.33 * overallSpeed;
    const float minOffsetSpread  = 0.6;
    const float maxOffsetSpread  = 2.0;
    const int   linesPerGroup    = 16;

    #define drawSmoothLine(pos,hw,t)  smoothstep(hw,0.0,abs(pos-(t)))
    #define drawCrispLine(pos,hw,t)   smoothstep(hw+gridSmoothWidth,hw,abs(pos-(t)))
    #define drawPeriodicLine(freq,w,t) drawCrispLine(freq/2.0,w,abs(mod(t,freq)-(freq)/2.0))
    #define drawCircle(p,r,c)         smoothstep(r+gridSmoothWidth,r,length(c-(p)))

    float random(float t){
      return (cos(t)+cos(t*1.3+1.3)+cos(t*1.4+1.4))/3.0;
    }
    float plasmaY(float x,float hFade,float offset){
      return random(x*lineFrequency+iTime*lineSpeed)*hFade*lineAmplitude+offset;
    }

    void main(){
      vec2 uv    = gl_FragCoord.xy / iResolution.xy;
      vec2 space = (gl_FragCoord.xy - iResolution.xy*0.5) / iResolution.x * 2.0 * scale;

      float hFade = 1.0-(cos(uv.x*6.28)*0.5+0.5);
      float vFade = 1.0-(cos(uv.y*6.28)*0.5+0.5);

      space.y += random(space.x*warpFrequency+iTime*warpSpeed)*warpAmplitude*(0.5+hFade);
      space.x += random(space.y*warpFrequency+iTime*warpSpeed+2.0)*warpAmplitude*hFade;

      vec4 lines = vec4(0.0);
      for(int l=0;l<linesPerGroup;l++){
        float norm   = float(l)/float(linesPerGroup);
        float offPos = float(l)+space.x*offsetFrequency;
        float rand   = random(offPos+iTime*offsetSpeed)*0.5+0.5;
        float hw     = mix(minLineWidth,maxLineWidth,rand*hFade)/2.0;
        float offset = random(offPos+iTime*offsetSpeed*(1.0+norm))*mix(minOffsetSpread,maxOffsetSpread,hFade);
        float lpos   = plasmaY(space.x,hFade,offset);
        float line   = drawSmoothLine(lpos,hw,space.y)/2.0+drawCrispLine(lpos,hw*0.15,space.y);
        float cx     = mod(float(l)+iTime*lineSpeed,25.0)-12.0;
        vec2  cp     = vec2(cx,plasmaY(cx,hFade,offset));
        line += drawCircle(cp,0.01,space)*4.0;
        lines += line*lineColor*rand;
      }

      vec4 col = mix(vec4(0.1,0.1,0.3,1.0), vec4(0.3,0.1,0.5,1.0), uv.x);
      col *= vFade;
      col.a = 1.0;
      col  += lines;
      gl_FragColor = col;
    }
  `);
  if (!vert || !frag) return null;

  const prog = gl.createProgram();
  gl.attachShader(prog, vert); gl.attachShader(prog, frag);
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) { console.error(gl.getProgramInfoLog(prog)); return null; }

  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);

  const posLoc  = gl.getAttribLocation(prog,  'pos');
  const resLoc  = gl.getUniformLocation(prog, 'iResolution');
  const timeLoc = gl.getUniformLocation(prog, 'iTime');

  function resize() {
    bgCanvas.width  = innerWidth;
    bgCanvas.height = innerHeight;
    gl.viewport(0, 0, innerWidth, innerHeight);
  }
  window.addEventListener('resize', resize);
  resize();

  const t0 = Date.now();
  return function () {
    gl.useProgram(prog);
    gl.uniform2f(resLoc, bgCanvas.width, bgCanvas.height);
    gl.uniform1f(timeLoc, (Date.now() - t0) / 1000);
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);
    gl.enableVertexAttribArray(posLoc);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  };
})();

(function () {

  // ─── Tile definitions (loaded from projects.js) ─────────────────────────────
  const TILES = PROJECTS;

  const N    = TILES.length; // 20
  const STEP = new THREE.Vector3(0.26, 0.52, -1.10);

  // ─── Renderer ───────────────────────────────────────────────────────────────
  const canvas = document.getElementById('c');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(innerWidth, innerHeight);
  renderer.setClearColor(0x000000, 0);

  // ─── Scene ──────────────────────────────────────────────────────────────────
  const scene = new THREE.Scene();

  // ─── Camera ─────────────────────────────────────────────────────────────────
  // Positioned above (+Y) and to the right (+X) of the card stack so the viewer
  // can see the TOP and RIGHT glass edges of every card (matching both references).
  // lookAt is pulled left + down so the current card (slot 0, world origin) sits
  // at lower-left on screen.
  const camera = new THREE.PerspectiveCamera(30, innerWidth / innerHeight, 0.01, 100);
  camera.position.set(3.5, 1.8, 8.0);
  // LookAt points well below the stack so the near card appears at center-left
  // (top of near card visible near screen center) and far end exits through top edge.
  camera.lookAt(0.3, 0.0, -3.5);

  // ─── Helpers ────────────────────────────────────────────────────────────────


  // ─── Rounded rectangle geometry helper ─────────────────────────────────────
  function roundedRect(w, h, r) {
    const shape = new THREE.Shape();
    const hw = w / 2, hh = h / 2;
    shape.moveTo(-hw + r, -hh);
    shape.lineTo( hw - r, -hh);
    shape.quadraticCurveTo( hw, -hh,  hw, -hh + r);
    shape.lineTo( hw,  hh - r);
    shape.quadraticCurveTo( hw,  hh,  hw - r,  hh);
    shape.lineTo(-hw + r,  hh);
    shape.quadraticCurveTo(-hw,  hh, -hw,  hh - r);
    shape.lineTo(-hw, -hh + r);
    shape.quadraticCurveTo(-hw, -hh, -hw + r, -hh);
    const geo = new THREE.ShapeGeometry(shape, 6);
    // Remap UVs from shape-space [-hw..hw, -hh..hh] to texture-space [0..1, 0..1]
    const uvs = geo.attributes.uv;
    for (let i = 0; i < uvs.count; i++) {
      uvs.setXY(i, (uvs.getX(i) + hw) / w, (uvs.getY(i) + hh) / h);
    }
    return geo;
  }

  // ─── Build card groups ──────────────────────────────────────────────────────
  const loader = new THREE.TextureLoader();
  const groups = [];

  TILES.forEach(t => {
    const { w, h } = t;
    const grp = new THREE.Group();

    // ── Face ──
    const tex = loader.load(t.img);
    tex.colorSpace = THREE.SRGBColorSpace;
    grp.add(new THREE.Mesh(roundedRect(w, h, 0.09),
      new THREE.MeshBasicMaterial({ map: tex })));


    grp.traverse(obj => { obj.frustumCulled = false; });
    scene.add(grp);
    groups.push(grp);
  });

  // ─── Scroll state ───────────────────────────────────────────────────────────
  let scrollPos = 0, target = 0, snapTimer = null;
  let hoveredIdx = -1;
  const hoverOffsets = new Array(N).fill(0);

  // ─── Tooltip ─────────────────────────────────────────────────────────────────
  const tooltip  = document.getElementById('tooltip');
  const ttTitle  = document.getElementById('tt-title');
  const ttSub    = document.getElementById('tt-sub');
  const ttTags   = document.getElementById('tt-tags');
  const ttVec    = new THREE.Vector3();
  let   ttActive = false, ttIdx = -1, ttExitTimer = null;

  const ttInner = document.getElementById('tooltip-inner');
  function ttShow() {
    if (ttExitTimer) { clearTimeout(ttExitTimer); ttExitTimer = null; }
    tooltip.classList.remove('tt-out', 'tt-on');
    void ttInner.offsetWidth; // force reflow so animation restarts from frame 0
    tooltip.classList.add('tt-on');
    ttActive = true;
  }
  function ttHide() {
    if (!ttActive) return;
    ttActive = false; ttIdx = -1;
    tooltip.classList.remove('tt-on');
    tooltip.classList.add('tt-out');
    ttExitTimer = setTimeout(() => { tooltip.classList.remove('tt-out'); ttExitTimer = null; }, 280);
  }

  function updateTooltip() {
    if (hoveredIdx < 0) { ttHide(); return; }
    if (hoveredIdx !== ttIdx) {
      ttIdx = hoveredIdx;
      const p = PROJECTS[ttIdx];
      ttTitle.textContent = p.title;
      ttSub.textContent   = p.subtitle;
      ttTags.innerHTML    = p.tags.map(t => `<span class="tt-tag">${t}</span>`).join('');
      ttShow();
    }
    ttVec.copy(groups[hoveredIdx].position);
    ttVec.x += TILES[hoveredIdx].w / 2;
    ttVec.project(camera);
    tooltip.style.left = ((ttVec.x * 0.5 + 0.5) * innerWidth)  + 'px';
    tooltip.style.top  = ((-ttVec.y * 0.5 + 0.5) * innerHeight) + 'px';
  }

  function posMod(a, b) { return ((a % b) + b) % b; }

  // ─── Position update ────────────────────────────────────────────────────────
  function update() {
    const base = Math.round(scrollPos);
    const frac = scrollPos - base;
    for (let i = 0; i < N; i++) {
      let slot = posMod(i - base, N);
      if (slot > 13) slot -= N;
      const s = slot - frac;
      const targetHover = (i === hoveredIdx) ? 1 : 0;
      hoverOffsets[i] += (targetHover - hoverOffsets[i]) * 0.05;
      groups[i].position.set(
        STEP.x * s + hoverOffsets[i] * 1.1,
        STEP.y * s,
        STEP.z * s
      );
      const ro = Math.round(100 - s * 10);
      groups[i].children.forEach(c => { c.renderOrder = ro; });
    }
  }

  // ─── Input ──────────────────────────────────────────────────────────────────
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    target += e.deltaY / 320;
    clearTimeout(snapTimer);
    snapTimer = setTimeout(() => { target = Math.round(target); }, 240);
  }, { passive: false });

  // ─── Raycaster — hover cursor + click to open project ───────────────────────
  const raycaster = new THREE.Raycaster();
  const mouse2d   = new THREE.Vector2();
  const faces     = groups.map(g => g.children[0]); // face mesh is always first child

  function updateMouse(e) {
    mouse2d.set((e.clientX / innerWidth) * 2 - 1, -(e.clientY / innerHeight) * 2 + 1);
  }

  canvas.addEventListener('mousemove', e => {
    updateMouse(e);
    raycaster.setFromCamera(mouse2d, camera);
    const hits = raycaster.intersectObjects(faces);
    if (hits.length) {
      hoveredIdx = faces.indexOf(hits[0].object);
      canvas.style.cursor = 'pointer';
    } else {
      hoveredIdx = -1;
      canvas.style.cursor = 'default';
    }
  });

  let mouseDownX = 0, mouseDownY = 0;
  canvas.addEventListener('mousedown', e => { mouseDownX = e.clientX; mouseDownY = e.clientY; });

  canvas.addEventListener('click', e => {
    // Ignore if the mouse moved more than 4px (user was scrolling, not clicking)
    if (Math.abs(e.clientX - mouseDownX) + Math.abs(e.clientY - mouseDownY) > 4) return;
    updateMouse(e);
    raycaster.setFromCamera(mouse2d, camera);
    const hits = raycaster.intersectObjects(faces);
    if (!hits.length) return;
    const idx = faces.indexOf(hits[0].object);
    if (idx >= 0 && PROJECTS[idx].id) {
      window.location.href = `project.html?id=${PROJECTS[idx].id}`;
    }
  });

  // ─── Resize ─────────────────────────────────────────────────────────────────
  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  // ─── Render loop ────────────────────────────────────────────────────────────
  (function animate() {
    requestAnimationFrame(animate);
    scrollPos += (target - scrollPos) * 0.10;
    if (_bgRender) _bgRender();
    update();
    updateTooltip();
    renderer.render(scene, camera);
  })();

})();
</script>
</body>
</html>

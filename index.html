<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNVEIL</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:transparent}
body{font-family:'Barlow',ui-sans-serif,sans-serif;font-weight:300;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.75);user-select:none}
#bg{position:fixed;inset:0;z-index:0;overflow:hidden;background:#000}
#bg-radial{position:absolute;inset:0;background:radial-gradient(100% 100% at 0% 0%,rgb(46,46,46) 0%,rgb(0,0,0) 100%);-webkit-mask:radial-gradient(125% 100% at 0% 0%,#000 0%,rgba(0,0,0,.224) 88.29%,rgba(0,0,0,0) 100%);mask:radial-gradient(125% 100% at 0% 0%,#000 0%,rgba(0,0,0,.224) 88.29%,rgba(0,0,0,0) 100%)}
.streak{position:absolute;inset:0;opacity:.20;background:linear-gradient(rgb(138,50,220) 0%,rgba(138,50,220,0) 100%);transform:skewX(45deg)}
#bg-dots{position:absolute;inset:0;opacity:.20;background-image:radial-gradient(circle at 1px 1px,rgba(255,255,255,.5) 1px,transparent 0);background-size:20px 20px}
#c{position:fixed;inset:0;z-index:1;display:block}
.nav{position:fixed;top:0;left:0;display:flex;align-items:center;gap:10px;padding:12px 16px;z-index:100}
.nav-item{display:flex;align-items:center;padding:10px 20px;border:1px solid rgba(255,255,255,.18);border-radius:6px;font-size:10.5px;letter-spacing:.10em;white-space:nowrap;background:transparent;cursor:pointer;transition:transform .28s cubic-bezier(.34,1.56,.64,1),border-color .25s}
.nav-item:hover{transform:scale(1.08);border-color:rgba(255,255,255,.5)}
.bottom-nav{position:fixed;bottom:14px;right:16px;display:flex;gap:14px;z-index:100;font-size:9.5px;letter-spacing:.09em}
.bottom-nav span{cursor:pointer;transition:transform .28s cubic-bezier(.34,1.56,.64,1),color .2s}
.bottom-nav .on{color:rgba(255,255,255,.85)}
.bottom-nav .off{color:rgba(255,255,255,.28)}
.bottom-nav span:hover{transform:scale(1.18);color:rgba(255,255,255,.95)!important}
</style>
</head>
<body>

<div id="bg">
  <div id="bg-radial">
    <div class="streak" style="-webkit-mask:linear-gradient(90deg,rgba(0,0,0,0) 0%,#000 20%,rgba(0,0,0,0) 36%,#000 55%,rgba(0,0,0,.13) 67%,#000 78%,rgba(0,0,0,0) 97%);mask:linear-gradient(90deg,rgba(0,0,0,0) 0%,#000 20%,rgba(0,0,0,0) 36%,#000 55%,rgba(0,0,0,.13) 67%,#000 78%,rgba(0,0,0,0) 97%)"></div>
    <div class="streak" style="-webkit-mask:linear-gradient(90deg,rgba(0,0,0,0) 11%,#000 25%,rgba(0,0,0,.55) 41%,rgba(0,0,0,.13) 67%,#000 78%,rgba(0,0,0,0) 97%);mask:linear-gradient(90deg,rgba(0,0,0,0) 11%,#000 25%,rgba(0,0,0,.55) 41%,rgba(0,0,0,.13) 67%,#000 78%,rgba(0,0,0,0) 97%)"></div>
    <div class="streak" style="-webkit-mask:linear-gradient(90deg,rgba(0,0,0,0) 9%,#000 20%,rgba(0,0,0,.55) 28%,rgba(0,0,0,.424) 40%,#000 48%,rgba(0,0,0,.267) 54%,rgba(0,0,0,.13) 78%,#000 88%,rgba(0,0,0,0) 97%);mask:linear-gradient(90deg,rgba(0,0,0,0) 9%,#000 20%,rgba(0,0,0,.55) 28%,rgba(0,0,0,.424) 40%,#000 48%,rgba(0,0,0,.267) 54%,rgba(0,0,0,.13) 78%,#000 88%,rgba(0,0,0,0) 97%)"></div>
    <div class="streak" style="-webkit-mask:linear-gradient(90deg,rgba(0,0,0,0) 0%,#000 17%,rgba(0,0,0,.55) 26%,#000 35%,rgba(0,0,0,0) 47%,rgba(0,0,0,.13) 69%,#000 79%,rgba(0,0,0,0) 97%);mask:linear-gradient(90deg,rgba(0,0,0,0) 0%,#000 17%,rgba(0,0,0,.55) 26%,#000 35%,rgba(0,0,0,0) 47%,rgba(0,0,0,.13) 69%,#000 79%,rgba(0,0,0,0) 97%)"></div>
    <div class="streak" style="-webkit-mask:linear-gradient(90deg,rgba(0,0,0,0) 0%,#000 20%,rgba(0,0,0,.55) 27%,#000 42%,rgba(0,0,0,0) 48%,rgba(0,0,0,.13) 67%,#000 74%,#000 82%,rgba(0,0,0,.47) 88%,rgba(0,0,0,0) 97%);mask:linear-gradient(90deg,rgba(0,0,0,0) 0%,#000 20%,rgba(0,0,0,.55) 27%,#000 42%,rgba(0,0,0,0) 48%,rgba(0,0,0,.13) 67%,#000 74%,#000 82%,rgba(0,0,0,.47) 88%,rgba(0,0,0,0) 97%)"></div>
  </div>
  <div id="bg-dots"></div>
</div>

<header class="nav">
  <div class="nav-item">HEIDI W. — PROJECTS PORTFOLIO</div>
  <div class="nav-item">CONTACT</div>
</header>

<canvas id="c"></canvas>

<div class="bottom-nav">
  <span class="on">OVERVIEW</span>
  <span class="off">INDEX</span>
</div>

<script src="three.min.js"></script>
<script src="projects.js"></script>
<script>
(function () {

  // ─── Tile definitions (loaded from projects.js) ─────────────────────────────
  const TILES = PROJECTS;

  const N    = TILES.length; // 20
  const STEP = new THREE.Vector3(0.26, 0.52, -1.10);
  const EDGE = 0.10;   // glass edge thickness in world units — visible bright strip

  // ─── Renderer ───────────────────────────────────────────────────────────────
  const canvas = document.getElementById('c');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(innerWidth, innerHeight);
  renderer.setClearColor(0x000000, 0);

  // ─── Scene ──────────────────────────────────────────────────────────────────
  const scene = new THREE.Scene();

  // ─── Camera ─────────────────────────────────────────────────────────────────
  // Positioned above (+Y) and to the right (+X) of the card stack so the viewer
  // can see the TOP and RIGHT glass edges of every card (matching both references).
  // lookAt is pulled left + down so the current card (slot 0, world origin) sits
  // at lower-left on screen.
  const camera = new THREE.PerspectiveCamera(30, innerWidth / innerHeight, 0.01, 100);
  camera.position.set(3.5, 1.8, 8.0);
  // LookAt points well below the stack so the near card appears at center-left
  // (top of near card visible near screen center) and far end exits through top edge.
  camera.lookAt(0.3, 0.0, -3.5);

  // ─── Helpers ────────────────────────────────────────────────────────────────
  function mkEdgeMat() {
    return new THREE.MeshBasicMaterial({
      color: 0xffffff,
      transparent: true,
      opacity: 0.88,
      depthWrite: false,
    });
  }


  // ─── Build card groups ──────────────────────────────────────────────────────
  const loader = new THREE.TextureLoader();
  const groups = [];

  TILES.forEach(t => {
    const { w, h } = t;
    const grp = new THREE.Group();

    // ── Face ──
    const tex = loader.load(t.img);
    tex.colorSpace = THREE.SRGBColorSpace;
    grp.add(new THREE.Mesh(new THREE.PlaneGeometry(w, h),
      new THREE.MeshBasicMaterial({ map: tex })));

    // ── Top border line on face surface ──
    const topBorder = new THREE.Mesh(
      new THREE.PlaneGeometry(w, 0.010),
      new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.85, depthWrite: false })
    );
    topBorder.position.set(0, h / 2 - 0.005, 0.002);
    grp.add(topBorder);

    // ── Left border line on face surface ──
    const leftBorder = new THREE.Mesh(
      new THREE.PlaneGeometry(0.010, h),
      new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.60, depthWrite: false })
    );
    leftBorder.position.set(-w / 2 + 0.005, 0, 0.002);
    grp.add(leftBorder);

    // ── Right glass edge ──
    // rotation.y = +π/2  →  plane normal rotates from +Z to +X
    // Camera is at positive X, so this face is visible to the viewer.
    const rightEdge = new THREE.Mesh(new THREE.PlaneGeometry(EDGE, h), mkEdgeMat());
    rightEdge.rotation.y = Math.PI / 2;
    rightEdge.position.x = w / 2;
    grp.add(rightEdge);

    // ── Top glass edge ──
    // rotation.x = -π/2  →  plane normal rotates from +Z to +Y
    // Camera is above (+Y), so this face is visible to the viewer.
    const topEdge = new THREE.Mesh(new THREE.PlaneGeometry(w, EDGE), mkEdgeMat());
    topEdge.rotation.x = -Math.PI / 2;
    topEdge.position.y = h / 2;
    grp.add(topEdge);

    grp.traverse(obj => { obj.frustumCulled = false; });
    scene.add(grp);
    groups.push(grp);
  });

  // ─── Scroll state ───────────────────────────────────────────────────────────
  let scrollPos = 0, target = 0, snapTimer = null;
  let hoveredIdx = -1;
  const hoverOffsets = new Array(N).fill(0);

  function posMod(a, b) { return ((a % b) + b) % b; }

  // ─── Position update ────────────────────────────────────────────────────────
  function update() {
    const base = Math.round(scrollPos);
    const frac = scrollPos - base;
    for (let i = 0; i < N; i++) {
      let slot = posMod(i - base, N);
      if (slot > 13) slot -= N;
      const s = slot - frac;
      const targetHover = (i === hoveredIdx) ? 1 : 0;
      hoverOffsets[i] += (targetHover - hoverOffsets[i]) * 0.05;
      groups[i].position.set(
        STEP.x * s + hoverOffsets[i] * 1.1,
        STEP.y * s,
        STEP.z * s
      );
      const ro = Math.round(100 - s * 10);
      groups[i].children.forEach(c => { c.renderOrder = ro; });
    }
  }

  // ─── Input ──────────────────────────────────────────────────────────────────
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    target += e.deltaY / 320;
    clearTimeout(snapTimer);
    snapTimer = setTimeout(() => { target = Math.round(target); }, 240);
  }, { passive: false });

  // ─── Raycaster — hover cursor + click to open project ───────────────────────
  const raycaster = new THREE.Raycaster();
  const mouse2d   = new THREE.Vector2();
  const faces     = groups.map(g => g.children[0]); // face mesh is always first child

  function updateMouse(e) {
    mouse2d.set((e.clientX / innerWidth) * 2 - 1, -(e.clientY / innerHeight) * 2 + 1);
  }

  canvas.addEventListener('mousemove', e => {
    updateMouse(e);
    raycaster.setFromCamera(mouse2d, camera);
    const hits = raycaster.intersectObjects(faces);
    if (hits.length) {
      hoveredIdx = faces.indexOf(hits[0].object);
      canvas.style.cursor = 'pointer';
    } else {
      hoveredIdx = -1;
      canvas.style.cursor = 'default';
    }
  });

  let mouseDownX = 0, mouseDownY = 0;
  canvas.addEventListener('mousedown', e => { mouseDownX = e.clientX; mouseDownY = e.clientY; });

  canvas.addEventListener('click', e => {
    // Ignore if the mouse moved more than 4px (user was scrolling, not clicking)
    if (Math.abs(e.clientX - mouseDownX) + Math.abs(e.clientY - mouseDownY) > 4) return;
    updateMouse(e);
    raycaster.setFromCamera(mouse2d, camera);
    const hits = raycaster.intersectObjects(faces);
    if (!hits.length) return;
    const idx = faces.indexOf(hits[0].object);
    if (idx >= 0 && PROJECTS[idx].id) {
      window.location.href = `project.html?id=${PROJECTS[idx].id}`;
    }
  });

  // ─── Resize ─────────────────────────────────────────────────────────────────
  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  // ─── Render loop ────────────────────────────────────────────────────────────
  (function animate() {
    requestAnimationFrame(animate);
    scrollPos += (target - scrollPos) * 0.10;
    update();
    renderer.render(scene, camera);
  })();

})();
</script>
</body>
</html>

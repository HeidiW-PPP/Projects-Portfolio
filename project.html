<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project — UNVEIL Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;min-height:100%;background:#0d0d12;color:#e8e8e2;font-family:'Barlow',ui-sans-serif,sans-serif;font-weight:300}

/* ── Nav ── */
.nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;height:40px;
  border-bottom:1px solid rgba(255,255,255,.08);
  background:rgba(13,13,18,.85);backdrop-filter:blur(10px);
  font-size:9.5px;letter-spacing:.09em;text-transform:uppercase;
}
.nav-back{
  display:flex;align-items:center;gap:8px;
  color:rgba(255,255,255,.55);text-decoration:none;transition:color .2s;
}
.nav-back:hover{color:#fff}
.nav-back svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.5}
.nav-brand{color:rgba(255,255,255,.35)}

/* ── Hero image ── */
.hero{
  margin-top:40px;width:100%;height:55vh;overflow:hidden;
  background:#111118;
}
.hero img{width:100%;height:100%;object-fit:cover;object-position:center;display:block}
.hero-placeholder{
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,.15);font-size:11px;letter-spacing:.12em;text-transform:uppercase;
}

/* ── Content ── */
.content{max-width:860px;margin:0 auto;padding:52px 32px 100px}

.meta{
  display:flex;align-items:center;gap:16px;
  margin-bottom:20px;font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;
}
.year{color:rgba(255,255,255,.35)}
.tags{display:flex;gap:8px;flex-wrap:wrap}
.tag{
  padding:3px 10px;border:1px solid rgba(255,255,255,.18);
  border-radius:2px;color:rgba(255,255,255,.5);font-size:9px;letter-spacing:.1em;
}
.status-badge{
  padding:3px 10px;border-radius:2px;font-size:9px;letter-spacing:.1em;
  background:rgba(255,255,255,.07);color:rgba(255,255,255,.35);
}
.status-badge.live{background:rgba(80,220,120,.12);color:rgba(80,220,120,.8)}

h1{
  font-size:clamp(28px,4vw,52px);font-weight:400;letter-spacing:-.01em;
  line-height:1.1;margin-bottom:10px;color:#fff;
}
.subtitle{
  font-size:14px;color:rgba(255,255,255,.45);letter-spacing:.03em;
  margin-bottom:40px;
}

/* ── Links ── */
.links{display:flex;gap:12px;margin-bottom:52px;flex-wrap:wrap}
.btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:9px 20px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;
  text-decoration:none;border-radius:2px;transition:all .2s;font-family:inherit;
}
.btn-github{
  background:rgba(255,255,255,.06);color:rgba(255,255,255,.7);
  border:1px solid rgba(255,255,255,.14);
}
.btn-github:hover{background:rgba(255,255,255,.12);color:#fff}
.btn-live{
  background:rgba(255,255,255,.9);color:#0d0d12;
  border:1px solid transparent;
}
.btn-live:hover{background:#fff}
.btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.5}

/* ── Description ── */
.description{
  font-size:15px;line-height:1.75;color:rgba(255,255,255,.65);
  margin-bottom:56px;max-width:660px;
}
.coming-soon-block{
  padding:48px 0;text-align:center;
  border-top:1px solid rgba(255,255,255,.06);
  border-bottom:1px solid rgba(255,255,255,.06);
  color:rgba(255,255,255,.2);font-size:11px;letter-spacing:.14em;text-transform:uppercase;
}

/* ── Gallery ── */
.gallery-title{
  font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;
  color:rgba(255,255,255,.3);margin-bottom:20px;
}
.gallery{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:12px;
}
.gallery img{
  width:100%;aspect-ratio:4/3;object-fit:cover;
  border-radius:2px;display:block;
}

/* ── Not found ── */
.not-found{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:80vh;text-align:center;gap:16px;
  color:rgba(255,255,255,.25);font-size:11px;letter-spacing:.12em;text-transform:uppercase;
}
.not-found a{color:rgba(255,255,255,.4);text-decoration:none}
.not-found a:hover{color:#fff}
</style>
</head>
<body>

<nav class="nav">
  <a href="index.html" class="nav-back">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    Back to projects
  </a>
  <span class="nav-brand">UNVEIL&thinsp;<sup style="font-size:6px;vertical-align:super">®</sup>&thinsp;PORTFOLIO</span>
</nav>

<div id="app"></div>

<script src="projects.js"></script>
<script>
(function () {
  const params  = new URLSearchParams(window.location.search);
  const id      = params.get('id');
  const project = PROJECTS.find(p => p.id === id);
  const app     = document.getElementById('app');

  if (!project) {
    app.innerHTML = `
      <div class="not-found">
        <div>Project not found</div>
        <a href="index.html">← Return to portfolio</a>
      </div>`;
    return;
  }

  document.title = `${project.title} — UNVEIL Portfolio`;

  const hasContent  = project.description && project.description.trim().length > 0;
  const hasGithub   = project.github  && project.github.trim().length > 0;
  const hasLive     = project.live    && project.live.trim().length > 0;
  const hasImages   = project.images  && project.images.length > 0;
  const isLive      = hasContent || hasGithub || hasLive || hasImages;

  const tagsHtml = (project.tags || [])
    .map(t => `<span class="tag">${t}</span>`)
    .join('');

  const statusHtml = isLive
    ? `<span class="status-badge live">Live</span>`
    : `<span class="status-badge">Coming soon</span>`;

  const linksHtml = (hasGithub || hasLive) ? `
    <div class="links">
      ${hasGithub ? `
        <a href="${project.github}" target="_blank" rel="noopener" class="btn btn-github">
          <svg viewBox="0 0 24 24"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
          GitHub
        </a>` : ''}
      ${hasLive ? `
        <a href="${project.live}" target="_blank" rel="noopener" class="btn btn-live">
          <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          Live Demo
        </a>` : ''}
    </div>` : '';

  const descriptionHtml = hasContent
    ? `<p class="description">${project.description}</p>`
    : `<div class="coming-soon-block">Full write-up coming soon</div>`;

  const galleryHtml = hasImages ? `
    <p class="gallery-title">Gallery</p>
    <div class="gallery">
      ${project.images.map(src => `<img src="${src}" alt="" loading="lazy">`).join('')}
    </div>` : '';

  const heroHtml = project.img
    ? `<img src="${project.img}" alt="${project.title}">`
    : `<div class="hero-placeholder">No image</div>`;

  app.innerHTML = `
    <div class="hero">${heroHtml}</div>
    <div class="content">
      <div class="meta">
        ${project.year ? `<span class="year">${project.year}</span>` : ''}
        ${statusHtml}
        <div class="tags">${tagsHtml}</div>
      </div>
      <h1>${project.title}</h1>
      ${project.subtitle ? `<p class="subtitle">${project.subtitle}</p>` : ''}
      ${linksHtml}
      ${descriptionHtml}
      ${galleryHtml}
    </div>`;
})();
</script>
</body>
</html>
